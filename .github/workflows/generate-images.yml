name: Génération automatique images.json

on:
  push:
    paths:
      - 'quizz_niveau1/**'
      - 'quizz_niveau2/**'
      - 'quizz_niveau3/**'

workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Télécharger le dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Générer images.json
        run: node generate-json.js

      - name: Commit automatique
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add images.json

          git diff --cached --quiet || git commit -m "Mise à jour automatique images.json"

          git push
