<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeries Quiz</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        h2 {
            margin-top: 50px;
            border-left: 5px solid #333;
            padding-left: 10px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .caption {
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }

    </style>

</head>
<body>

    <h1>Galeries automatiques</h1>

    <h2>Niveau 1</h2>
    <div class="gallery" id="quizz_niveau1"></div>

    <h2>Niveau 2</h2>
    <div class="gallery" id="quizz_niveau2"></div>

    <h2>Niveau 3</h2>
    <div class="gallery" id="quizz_niveau3"></div>

    <script>

        fetch('images.json')

            .then(response => response.json())

            .then(data => {

                Object.keys(data).forEach(dossier => {

                    const gallery = document.getElementById(dossier);

                    if (!gallery) {
                        return;
                    }

                    data[dossier].forEach((image, index) => {

                        const card = document.createElement('div');

                        card.className = 'card';

                        card.innerHTML = `
                            <img 
                                src="${dossier}/${image}" 
                                alt="Photo ${index + 1}"
                            >

                            <div class="caption">
                                Photo n°${index + 1}
                            </div>
                        `;

                        gallery.appendChild(card);

                    });

                });

            })

            .catch(error => {

                console.error(
                    'Erreur chargement images.json :',
                    error
                );

            });

    </script>

</body>
</html>
