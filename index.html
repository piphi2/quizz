<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galeries Quiz</title>

<style>

body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 40px;
}

h2 {
    margin-top: 50px;
    border-left: 5px solid #333;
    padding-left: 10px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.card {
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    cursor: pointer;
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
}

.caption {
    padding: 10px;
    text-align: center;
    font-weight: bold;
}

/* ===== LIGHTBOX ===== */

.lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 9999;
}

.lightbox.active {
    display: flex;
}

.lightbox img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 10px;
    user-select: none;
}

/* BOUTONS */

.controls {
    position: absolute;
    bottom: 30px;
    display: flex;
    gap: 20px;
}

button {
    padding: 10px 15px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.nav-btn {
    background: white;
}

.back-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    background: #ff4d4d;
    color: white;
}

/* COMPTEUR */

#counter {
    position: absolute;
    top: 20px;
    right: 20px;
    color: white;
    font-size: 18px;
    font-weight: bold;
}

</style>
</head>

<body>

<h1>Galeries automatiques</h1>

<h2>Niveau 1</h2>
<div class="gallery" id="quizz_niveau1"></div>

<h2>Niveau 2</h2>
<div class="gallery" id="quizz_niveau2"></div>

<h2>Niveau 3</h2>
<div class="gallery" id="quizz_niveau3"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">

    <button class="back-btn" onclick="goHome()">⬅ Retour</button>

    <div id="counter"></div>

    <img id="lightbox-img">

    <div class="controls">
        <button class="nav-btn" onclick="prevImage()">⬅ Précédent</button>
        <button class="nav-btn" onclick="nextImage()">Suivant ➡</button>
    </div>

</div>

<script>

let images = [];
let currentIndex = 0;

const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');
const counter = document.getElementById('counter');

function openLightbox(list, index) {
    images = list;
    currentIndex = index;
    lightbox.classList.add('active');
    showImage();
}

function showImage() {
    lightboxImg.src = images[currentIndex];
    counter.textContent = `${currentIndex + 1} / ${images.length}`;
}

function nextImage() {
    currentIndex = (currentIndex + 1) % images.length;
    showImage();
}

function prevImage() {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    showImage();
}

function closeLightbox() {
    lightbox.classList.remove('active');
    lightboxImg.src = '';
}

function goHome() {
    window.location.href = "index.html";
}

/* SWIPE MOBILE */
let startX = 0;

lightbox.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
});

lightbox.addEventListener('touchend', e => {
    let endX = e.changedTouches[0].clientX;

    if (startX - endX > 50) nextImage();
    if (endX - startX > 50) prevImage();
});

/* CLAVIER */
document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('active')) return;

    if (e.key === 'ArrowRight') nextImage();
    if (e.key === 'ArrowLeft') prevImage();
    if (e.key === 'Escape') closeLightbox();
});

fetch('images.json')
.then(res => res.json())
.then(data => {

    Object.keys(data).forEach(dossier => {

        const gallery = document.getElementById(dossier);

        const list = data[dossier].map(img => `${dossier}/${img}`);

        data[dossier].forEach((image, index) => {

            const card = document.createElement('div');
            card.className = 'card';

            const imgSrc = `${dossier}/${image}`;

            card.innerHTML = `
                <img src="${imgSrc}">
                <div class="caption">Photo n°${index + 1}</div>
            `;

            card.addEventListener('click', () => {
                openLightbox(list, index);
            });

            gallery.appendChild(card);
        });

    });

});

</script>

</body>
</html>
