<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeries Quiz</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        h2 {
            margin-top: 50px;
            border-left: 5px solid #333;
            padding-left: 10px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .caption {
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }

        /* ===== LIGHTBOX ===== */

        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .lightbox img {
            max-width: 95%;
            max-height: 95%;
            cursor: pointer;
            border-radius: 10px;
        }

        .lightbox.active {
            display: flex;
        }

    </style>
</head>

<body>

<h1>Galeries automatiques</h1>

<h2>Niveau 1</h2>
<div class="gallery" id="quizz_niveau1"></div>

<h2>Niveau 2</h2>
<div class="gallery" id="quizz_niveau2"></div>

<h2>Niveau 3</h2>
<div class="gallery" id="quizz_niveau3"></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <img id="lightbox-img" src="">
</div>

<script>

fetch('images.json')
    .then(res => res.json())
    .then(data => {

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        Object.keys(data).forEach(dossier => {

            const gallery = document.getElementById(dossier);

            data[dossier].forEach((image, index) => {

                const card = document.createElement('div');
                card.className = 'card';

                const imgSrc = `${dossier}/${image}`;

                card.innerHTML = `
                    <img src="${imgSrc}" alt="Photo ${index + 1}">
                    <div class="caption">Photo n°${index + 1}</div>
                `;

                // clic sur image → plein écran
                card.addEventListener('click', () => {
                    lightboxImg.src = imgSrc;
                    lightbox.classList.add('active');
                });

                gallery.appendChild(card);
            });

        });

        // clic sur plein écran → retour galerie
        lightbox.addEventListener('click', () => {
            lightbox.classList.remove('active');
            lightboxImg.src = '';
        });

    });

</script>

</body>
</html>
